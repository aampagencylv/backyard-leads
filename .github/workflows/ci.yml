name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        env:
          # Minimal env so app/config can load. None of these point at
          # real services — the tests use in-memory SQLite and stub
          # external calls.
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          RESEND_API_KEY: "test-key"
          SECRET_KEY: "test-secret-key-for-ci-only"
          BMP_POSTAL_ADDRESS: "Test Address"
          SEND_DOMAIN: "test.example.com"
          REPLY_DOMAIN: "reply.test.example.com"
          PUBLIC_URL: "https://test.example.com"
        run: pytest tests/ -v --tb=short

  compile-check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax + import check on all app modules
        run: |
          python -m compileall -q app/ scripts/
          echo "All Python modules parse cleanly."

  migration-chain-check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Verify every migration script exists + every script is registered
        run: |
          # Extract registered migrations from database.py
          REGISTERED=$(grep -oE 'scripts\.migrate_[a-z0-9_]+' app/database.py | sort -u)
          # List actual migration files. The sed turns 'scripts/migrate_x.py'
          # into 'scripts.migrate_x' (replace '/' with '.', strip '.py').
          # Earlier 's|^|scripts.|' was a bug: it prepended 'scripts.' to a
          # path that already started with 'scripts/', producing duplicate
          # 'scripts.scripts/...' that never matched the registered list.
          ACTUAL=$(ls scripts/migrate_*.py | sed 's|/|.|; s|\.py$||' | sort -u)

          # Legacy orphan files (intentionally not in the migration chain):
          # These pre-date the chain runner; their tables/columns are now
          # created via Base.metadata.create_all OR they're one-shot historical
          # scripts that already ran. Frozen at the snapshot taken when the
          # chain-check sed bug was fixed (2026-06-04). New migrations must
          # be registered in app/database.py and will fail CI if orphaned.
          LEGACY_ORPHANS=(
            "scripts.migrate_audit_reports"
            "scripts.migrate_blooio_key"
            "scripts.migrate_blooio_signing_secret"
            "scripts.migrate_booking_tz"
            "scripts.migrate_call_availability"
            "scripts.migrate_call_fields"
            "scripts.migrate_call_ratings"
            "scripts.migrate_campaigns"
            "scripts.migrate_company_domain"
            "scripts.migrate_credit_ledger"
            "scripts.migrate_deepgram_key"
            "scripts.migrate_dial_modes"
            "scripts.migrate_email_reply_tokens"
            "scripts.migrate_feedback_deletions"
            "scripts.migrate_is_archived"
            "scripts.migrate_leads_to_companies"
            "scripts.migrate_messaging_direction"
            "scripts.migrate_netrows_caches"
            "scripts.migrate_notification_prefs"
            "scripts.migrate_onboarding"
            "scripts.migrate_page_views"
            "scripts.migrate_pageview_events"
            "scripts.migrate_phone_type"
            "scripts.migrate_resend_webhook_secret"
            "scripts.migrate_roles_and_views"
            "scripts.migrate_runtime_config"
            "scripts.migrate_send_cap"
            "scripts.migrate_sequence_engine"
            "scripts.migrate_signature_fields"
            "scripts.migrate_sms_optout"
            "scripts.migrate_snooze"
            "scripts.migrate_tracking_links"
            "scripts.migrate_twilio_fields"
            "scripts.migrate_voicemail_greeting"
          )

          # Every registered migration must have a file
          for m in $REGISTERED; do
            f=$(echo "$m" | sed 's|\.|/|g').py
            if [ ! -f "$f" ]; then
              echo "❌ Registered migration $m has no file at $f"
              exit 1
            fi
          done

          # Every migration file must be registered (or be on the legacy
          # orphan allowlist).
          for m in $ACTUAL; do
            is_legacy=0
            for orphan in "${LEGACY_ORPHANS[@]}"; do
              if [ "$m" = "$orphan" ]; then
                is_legacy=1
                break
              fi
            done
            if [ "$is_legacy" -eq 1 ]; then
              continue
            fi
            if ! grep -q "\"$m\"" app/database.py; then
              echo "❌ Migration file $m exists but isn't in app/database.py migration chain"
              exit 1
            fi
          done

          echo "✓ Migration chain is consistent."
